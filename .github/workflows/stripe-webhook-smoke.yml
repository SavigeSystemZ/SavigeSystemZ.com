name: stripe-webhook-smoke

on:
  workflow_dispatch:

jobs:
  signed-webhook:
    if: ${{ secrets.STRIPE_SECRET_KEY != '' && secrets.STRIPE_WEBHOOK_SECRET != '' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ssz
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: savige
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ssz -d savige"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Prisma migrate, bootstrap catalog
        run: pnpm --filter web exec prisma generate && pnpm --filter web exec prisma migrate deploy && pnpm code:bootstrap
        env:
          DATABASE_URL: postgresql://ssz:dev@localhost:5432/savige
          GITHUB_MOCK_MODE: "1"
      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Signed webhook E2E only
        run: pnpm --filter web exec playwright test tests/e2e/stripe-webhook-signed.spec.ts
        env:
          CI: "1"
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          DATABASE_URL: postgresql://ssz:dev@localhost:5432/savige
          OWNER_ACCESS_CODE: e2e-owner-code
          OWNER_LOGIN_SECRET: e2e-owner-secret-change-me-32chars
          E2E_PORT: "3456"
          VAULT_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          GITHUB_MOCK_MODE: "1"
